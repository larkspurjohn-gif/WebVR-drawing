<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Marble Starter</title>
  <style>
    body {
      margin: 0;
    }

    canvas {
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20.0/+esm",
        "@sparkjsdev/spark": "./spark.module.min.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { SparkRenderer, SplatMesh, SparkControls, SparkXr, textSplats, dyno, utils, generators } from "@sparkjsdev/spark";
    import GUI from "lil-gui";

    const SCENE_CONFIG = {
      SNOW_HEIGHT: 8,
      HALF_WIDTH: 12,
      HALF_DEPTH: 48,
      SNOW_MIN_Y: -10,
      CAMERA_DURATION: 90,
    };

    const RENDER_TIMEOUT_MS = 5 * 1000;
    const URL_BASE = ".";

    const scene = new THREE.Scene();
    // scene.background = new THREE.Color(0.75, 1.0, 1.0);
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Make a local frame of reference that we can move to control
    // the camera, or as a frame of reference in WebXR mode
    const localFrame = new THREE.Group();
    scene.add(localFrame);

    // Lower the splat rendering width to sqrt(5) std devs for more performance
    const spark = new SparkRenderer({
      renderer,
      maxStdDev: Math.sqrt(5),
    });
    scene.add(spark);
    localFrame.add(camera);

    const stats = new Stats();
    document.body.appendChild(stats.dom);


    const scene_json = await fetch(`${URL_BASE}/scene.json`).then((response) => response.json());
    const splats = scene_json.splats ?? [];
    const meshes = scene_json.meshes ?? [];

 const cam = camera.position;
    const snowVolumeBox = new THREE.Box3(
      new THREE.Vector3(
        cam.x - SCENE_CONFIG.HALF_WIDTH,
        cam.y - (SCENE_CONFIG.SNOW_HEIGHT * 8),
        cam.z - SCENE_CONFIG.HALF_DEPTH * 2 + 50,
      ),
      new THREE.Vector3(
        cam.x + SCENE_CONFIG.HALF_WIDTH + 20,
        cam.y + SCENE_CONFIG.SNOW_HEIGHT * 2 ,
        cam.z + SCENE_CONFIG.HALF_DEPTH / 128 + 50,
      ),
    );

     const snow = generators.snowBox({
      ...generators.DEFAULT_SNOW,
      box: snowVolumeBox.clone(),
      minY: SCENE_CONFIG.SNOW_MIN_Y,
      color1: new THREE.Color(0xffc0cb),
      color2: new THREE.Color(0xffffff),
      density: 1200,
      maxScale: 0.035,
      opacity: 0.6, 
      transparent: true,
    });
    scene.add(snow.snow);

    const gui = new GUI({ title: "Petal Particle Simulation" });
    const params = {
      fallVelocity: 0.015,     
      wanderScale: 0.9,        
      wanderVariance: 4.5,     
      maxScale: 0.035,

      color1: new THREE.Color(1.0, 0.8, 0.9),
      color2: new THREE.Color(1.0, 1.0, 1.0),

      isPaused: false,
      fallDirection: new THREE.Vector3(-0.5, -1, 0).normalize(),
      windDirection: "No Direction",

      _previousFallVelocity: generators.DEFAULT_SNOW.fallVelocity,
      _previousWanderScale: generators.DEFAULT_SNOW.wanderScale,
      _previousWanderVariance: generators.DEFAULT_SNOW.wanderVariance,
    };

    // snow parameter controls
    gui.add(params, "fallVelocity", 0.01, 0.5, 0.01).name("Fall Velocity");
    gui.add(params, "wanderScale", 0.01, 1, 0.01).name("Wander Scale");
    gui.add(params, "wanderVariance", 1, 5, 0.1).name("Wander Variance");
    gui.add(params, "maxScale", 0.001, 0.05, 0.001).name("Petal Size");
    gui
      .add(params, "isPaused")
      .name("Pause Petals")
      .onChange((value) => {
        if (value) {
          params._previousFallVelocity = params.fallVelocity;
          params._previousWanderScale = params.wanderScale;
          params._previousWanderVariance = params.wanderVariance;

          snow.fallVelocity.value = 0;
          snow.wanderScale.value = 0;
          snow.wanderVariance.value = 0;
        } else {
          snow.fallVelocity.value = params._previousFallVelocity;
          snow.wanderScale.value = params._previousWanderScale;
          snow.wanderVariance.value = params._previousWanderVariance;
        }
      });

    // color
    const colorFolder = gui.addFolder("Petal Colors");
    colorFolder
      .addColor(params, "color1")
      .onChange((value) => {
        snow.color1.value.set(value.r, value.g, value.b);
      })
      .name("Color 1");
    colorFolder
      .addColor(params, "color2")
      .onChange((value) => {
        snow.color2.value.set(value.r, value.g, value.b);
      })
      .name("Color 2");

    // wind
    const directionFolder = gui.addFolder("Wind Orientation");
    directionFolder
      .add(params.fallDirection, "x", -1, 1, 0.1)
      .onChange(() => {
        params.fallDirection.normalize();
        snow.fallDirection.value.copy(params.fallDirection);
      })
      .name("East-West");
    directionFolder
      .add(params.fallDirection, "z", -1, 1, 0.1)
      .onChange(() => {
        params.fallDirection.normalize();
        snow.fallDirection.value.copy(params.fallDirection);
      })
      .name("North-South");

    const windFolder = gui.addFolder("Wind Direction Presets");
    windFolder
      .add(params, "windDirection", [
        "N",
        "NE",
        "E",
        "SE",
        "No Direction",
        "S",
        "SW",
        "W",
        "NW",
      ])
      .onChange((value) => {
        const directions = {
          N: new THREE.Vector3(0, -1, -1),
          NE: new THREE.Vector3(1, -1, -1),
          E: new THREE.Vector3(1, -1, 0),
          SE: new THREE.Vector3(1, -1, 1),
          "No Direction": new THREE.Vector3(0, -1, 0),
          S: new THREE.Vector3(0, -1, 1),
          SW: new THREE.Vector3(-1, -1, 1),
          W: new THREE.Vector3(-1, -1, 0),
          NW: new THREE.Vector3(-1, -1, -1),
        };
        params.fallDirection.copy(directions[value]).normalize();
        snow.fallDirection.value.copy(params.fallDirection);
      })
      .name("Wind Direction");

    renderer.setAnimationLoop(function animate(time) {
      const t = time * 0.001;
      const dt = t - (lastTime ?? t);
      lastTime = t;

      controls.update(dt, camera);
       const targetZ = -13.5;
      const startZ = 0;
      const duration = 90;
      const progress = Math.min(1, t / duration);
      const smoothProgress = Math.sin(progress * Math.PI * 0.5);
      camera.position.z = startZ + (targetZ - startZ) * smoothProgress;

      if (!params.isPaused) {
        const sway = Math.sin(t * 2.0) * 0.5;
        const windGust = Math.sin(t * 0.5); 
        const microTurbulence = Math.cos(t * 2.0) * 0.2;
        snow.fallDirection.value.x = params.fallDirection.x + sway * 0.2+ (windGust * 0.5) + microTurbulence;
        snow.fallDirection.value.z = params.fallDirection.z + (windGust * 0.3);
        snow.fallDirection.value.normalize();
        snow.fallVelocity.value = params.fallVelocity + (Math.abs(windGust) * 0.01);
        snow.wanderScale.value = params.wanderScale;
        snow.wanderVariance.value = params.wanderVariance;
        snow.maxScale.value = params.maxScale;
      }

      renderer.render(scene, camera);
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // White light, full intensity
      scene.add(ambientLight);
    });



    // Load splats
    for (const splat of splats) {
      const splatMesh = new SplatMesh({ url: `${URL_BASE}/${splat.filename}`, lod: true });
      splatMesh.position.fromArray(splat.transform?.translation ?? [0, 0, 0]);
      splatMesh.quaternion.fromArray(splat.transform?.quaternion ?? [0, 0, 0, 1]);
      const scale = splat.transform?.scale ?? 1;
      splatMesh.scale.set(scale, scale, scale);
      scene.add(splatMesh);
    }

    // Helper to extract albedo color and texture from any material
    function extractAlbedoProperties(material) {
      let color = new THREE.Color(0x888888);
      let map = null;

      if (material.color instanceof THREE.Color) {
        color = material.color.clone();
      }
      if (material.map) {
        map = material.map;
      }

      return { color, map };
    }

    // Convert mesh materials to MeshBasicMaterial (matches Marble's behavior)
    function convertToBasicMaterials(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          const originalMaterial = child.material;
          const originalMaterials = Array.isArray(originalMaterial)
            ? originalMaterial
            : [originalMaterial];

          if (originalMaterials.length === 0) {
            child.material = new THREE.MeshBasicMaterial({
              color: 0x888888,
              side: THREE.DoubleSide,
            });
          } else {
            const newMaterials = originalMaterials.map((mat) => {
              const { color, map } = extractAlbedoProperties(mat);
              return new THREE.MeshBasicMaterial({
                color: color,
                map: map,
                side: THREE.DoubleSide,
              });
            });

            child.material = newMaterials.length === 1 ? newMaterials[0] : newMaterials;
          }
        }
      });
    }

    // Load meshes (GLB/GLTF)
    const gltfLoader = new GLTFLoader();
    for (const mesh of meshes) {
      try {
        const gltf = await gltfLoader.loadAsync(`${URL_BASE}/${mesh.filename}`);
        const model = gltf.scene;
        // Convert to MeshBasicMaterial to not need lighting
        convertToBasicMaterials(model);

        model.position.fromArray(mesh.transform?.translation ?? [0, 0, 0]);
        model.quaternion.fromArray(mesh.transform?.quaternion ?? [0, 0, 0, 1]);
        const meshScale = mesh.transform?.scale ?? [1, 1, 1];
        model.scale.set(meshScale[0], meshScale[1], meshScale[2]);
        scene.add(model);
      } catch (error) {
        console.warn(`Failed to load mesh: ${mesh.filename}`, error);
      }
    }

    window.THREE = THREE;
    window.scene = scene;
    window.renderer = renderer;

    window.addEventListener("resize", onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    let renderEnabled = true;
    let lastMoved = 0;
    let lastPos = new THREE.Vector3().setScalar(Number.NEGATIVE_INFINITY);
    let lastDir = new THREE.Vector3();

    const controls = new SparkControls({
      canvas: renderer.domElement,
    });
    controls.pointerControls.reverseRotate = utils.isMobile();
    gui.add(controls.pointerControls, "reverseRotate").name("Reverse look").listen();
    controls.pointerControls.rotateSpeed *= 2.0;
    controls.pointerControls.slideSpeed *= 0.75;

    const xr = new SparkXr({
      renderer,
      onMouseLeaveOpacity: 0.5,
      onReady: async (supported) => {
        console.log(`SparkXr initialized: XR ${supported ? "supported" : "not supported"}`);
      },
      onEnterXr: () => {
        console.log("Enter XR");
      },
      onExitXr: () => {
        console.log("Exit XR");
      },
      // enableHands: true,
      controllers: {
        // moveHeading: true,
      },
    });

    // localFrame.add(xr.makeJointSplats(SparkXr.Hand.left));
    // localFrame.add(xr.makeJointSplats(SparkXr.Hand.right));

    let lastTime = 0;
    let rotation = 0;
    let xrTime = 0;

    // gui.add({ disableRender: () => {
    //   renderEnabled = false;
    //   console.log("Render disabled");
    // } }, "disableRender").name("Disable render");

    gui.add(spark, "lodSplatScale", 0.001, 3.0, 0.001);

    document.addEventListener("keydown", (event) => {
      if (event.key === "\\") {
        const cameraPos = camera.getWorldPosition(new THREE.Vector3());
        const cameraQuat = camera.getWorldQuaternion(new THREE.Quaternion());
        console.log("camera position: ", JSON.stringify(cameraPos.toArray()), "quaternion: ", JSON.stringify(cameraQuat.toArray()));
      }
    });

    renderer.setAnimationLoop(function animate(time, xrFrame) {
      stats.begin();

      const deltaTime = time - (lastTime || time);
      lastTime = time;

      xr.updateControllers(camera);
      controls.update(localFrame, camera);

      const now = performance.now();
      const dir = localFrame.getWorldDirection(new THREE.Vector3());
      if ((localFrame.position.distanceTo(lastPos) > 0.0001) || (dir.dot(lastDir) < 0.9999)) {
        lastMoved = now;
        if (!renderEnabled) {
          console.log("Render enabled");
        }
        renderEnabled = true;
        lastPos.copy(localFrame.position);
        lastDir.copy(dir);
      }
      if ((now - lastMoved) > RENDER_TIMEOUT_MS) {
        if (renderEnabled) {
          console.log("Render disabled");
        }
        renderEnabled = false;
      }

      if (renderEnabled) {
        renderer.render(scene, camera);
      }

      stats.end();
    });
  </script>
</body>

</html>
